    <!-- ── JSON-LD: FAQPage (Answer Engine Optimization) ──── -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "FAQPage",
        "mainEntity": [
          {
            "@type": "Question",
            "name": "What is lenticular-fx?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "lenticular-fx is a React component that recreates the lenticular print effect on any content. Wrap two children (front and back) and as the cursor slides across the wrapper, the back face is revealed through interleaved vertical clip-path columns — exactly like a physical lenticular sticker or trading card."
            }
          },
          {
            "@type": "Question",
            "name": "How do I install lenticular-fx?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Run `bun add lenticular-fx`, `npm install lenticular-fx`, or `pnpm add lenticular-fx`. It declares `react` and `react-dom` as peer dependencies and has no runtime dependencies of its own."
            }
          },
          {
            "@type": "Question",
            "name": "Does lenticular-fx work with server-side rendering?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Yes. The component is SSR-safe — there is no `window` access at module level, the styles are injected on the client via a singleton, and the initial render shows the `front` face statically. Mouse listeners and the requestAnimationFrame loop only attach after hydration."
            }
          },
          {
            "@type": "Question",
            "name": "Can I make the card tilt in 3D as I slide the cursor?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Yes. Pass the `tilt` prop in degrees (e.g. `tilt={14}`) and the wrapper will apply `transform: perspective(900px) rotateY(...)` each frame driven by the same offset that powers the slicing. A `perspective` prop lets you tune the depth."
            }
          },
          {
            "@type": "Question",
            "name": "Why does the back face not fully reveal at the right edge sometimes?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Without `hitMargin` you have to land the cursor exactly on the wrapper's right edge. lenticular-fx defaults `hitMargin` to 24 pixels — extra hit-area on every side — so you can overshoot the visible edge and still pin the offset at 1, keeping the back fully revealed. Bump it higher (40–60) for chunkier cards."
            }
          },
          {
            "@type": "Question",
            "name": "Which browsers are supported?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Chrome / Edge 88+, Safari 14.1+, Firefox 63+. The effect relies on `clip-path: path()` with multiple sub-paths plus standard `ResizeObserver` and `IntersectionObserver` APIs — all available in evergreen browsers."
            }
          },
          {
            "@type": "Question",
            "name": "Does lenticular-fx respect prefers-reduced-motion?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Yes. When the user has `prefers-reduced-motion: reduce` set, the lerp is short-circuited to an instant snap, so the content still reveals but without the smooth interpolation."
            }
          }
        ]
